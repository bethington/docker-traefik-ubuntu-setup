services:
  budget:
    image: actualbudget/actual-server:latest
    container_name: budget
    restart: unless-stopped
    ports:
      - '5006:5006'
    volumes:
      - ./data:/data
    environment:
      - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Route container traffic through the proxy network on the app's internal port
      - "traefik.http.services.budget.loadbalancer.server.port=5006"
      # COOP/COEP headers required by Actual's SharedArrayBuffer-based sync
      - "traefik.http.middlewares.budget-headers.headers.customresponseheaders.Cross-Origin-Opener-Policy=same-origin"
      - "traefik.http.middlewares.budget-headers.headers.customresponseheaders.Cross-Origin-Embedder-Policy=require-corp"
      # HTTPS router
      - "traefik.http.routers.budget.rule=Host(`budget.xebyte.us`) || Host(`budget.xebyte.com`)"
      - "traefik.http.routers.budget.entrypoints=websecure"
      - "traefik.http.routers.budget.tls.certresolver=le"
      - "traefik.http.routers.budget.tls.domains[0].main=budget.xebyte.us"
      - "traefik.http.routers.budget.tls.domains[1].main=budget.xebyte.com"
      - "traefik.http.routers.budget.service=budget"
      - "traefik.http.routers.budget.middlewares=budget-headers"
      # HTTP router with redirect to HTTPS
      - "traefik.http.routers.budget-http.rule=Host(`budget.xebyte.us`) || Host(`budget.xebyte.com`)"
      - "traefik.http.routers.budget-http.entrypoints=web"
      - "traefik.http.routers.budget-http.middlewares=redirect-to-https@file"

networks:
  proxy:
    external: true
